services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_test
    networks:
      - test-network

  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:sha-${GITHUB_SHA}
    environment:
      DB_HOST: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp_test
    depends_on:
      - postgres
    networks:
      - test-network

  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY}/nginx:sha-${GITHUB_SHA}
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - test-network

networks:
  test-network:
